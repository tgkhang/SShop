services:
  mongo:
    image: mongo:7
    container_name: sshop-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password

  redis:
    image: redis:7-alpine
    container_name: sshop-redis
    restart: unless-stopped
    ports:
      - "6379:6379"